# Hamilton Playground 配置（NewtonBench 单题迭代展示）
# 用于“1 个 hard 任务 + 高轮数”场景，突出迭代优化过程

llm:
  openai:
    provider: "openai"
    model: "gpt-5-chat"
    api_key: "${OPENAI_API_KEY}"
    base_url: "${OPENAI_BASE_URL}"
    temperature: 0.4
    max_tokens: 12000
    timeout: 120
    max_retries: 3
    retry_delay: 1.0

  default: "openai"

agents:
  hamilton:
    llm: "openai"
    max_turns: 120
    enable_tools: true

    context:
      max_tokens: 200000
      truncation_strategy: "latest_half"
      preserve_system_messages: true
      preserve_recent_turns: 10

    system_prompt_file: "prompts/hamilton_newtonbench_system.txt"
    user_prompt_file: "prompts/hamilton_newtonbench_user.txt"

    skills:
      - newtonbench
      - evo-protocol

    tools:
      builtin: ["*"]

session:
  type: "local"

  local:
    working_dir: "./playground/hamilton/workspace_newtonbench"
    timeout: 21600
    gpu_devices: null
    cpu_devices: null
    symlinks:
      "evomaster/skills/newtonbench": "skills/newtonbench"

experiment:
  record_dir: "./playground/hamilton/records"
  # 单题 hard 任务的迭代展示：提高轮数上限
  max_rounds: 2
  workspace_template: "playground/hamilton/workspace_newtonbench"
  seed_input_csv: false
  require_input_csv: false
  newtonbench_protocol:
    require_signature_match: true
    require_finite_rmsle: true
    max_rmsle: 2.0

llm_output:
  show_in_console: true
  log_to_file: true

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  console: true

project_root: "."
debug: false

