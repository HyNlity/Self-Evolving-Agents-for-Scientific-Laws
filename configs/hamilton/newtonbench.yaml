# Hamilton Playground 配置（NewtonBench profile）
# 仍使用同一个 hamilton playground，仅切换 prompt/skill/workspace profile

llm:
  openai:
    provider: "openai"
    model: "gpt-5-chat"
    api_key: "${OPENAI_API_KEY}"
    base_url: "${OPENAI_BASE_URL}"
    temperature: 0.4
    max_tokens: 12000
    timeout: 120
    max_retries: 3
    retry_delay: 1.0

  default: "openai"

agents:
  hamilton:
    llm: "openai"
    max_turns: 120
    enable_tools: true

    context:
      max_tokens: 200000
      truncation_strategy: "latest_half"
      preserve_system_messages: true
      preserve_recent_turns: 10

    system_prompt_file: "prompts/hamilton_newtonbench_system.txt"
    user_prompt_file: "prompts/hamilton_newtonbench_user.txt"

    # 单 Agent + skill 驱动
    skills:
      - newtonbench
      - evo-protocol

    tools:
      builtin: ["*"]

session:
  type: "local"

  local:
    working_dir: "./playground/hamilton/workspace_newtonbench"
    timeout: 21600
    gpu_devices: null
    cpu_devices: null
    symlinks:
      "evomaster/skills/newtonbench": "skills/newtonbench"

experiment:
  record_dir: "./playground/hamilton/records"
  # NewtonBench 的“轮次”主要在单次对话内控制，这里先设为 1
  max_rounds: 1
  # workspace profile（供 HamiltonPlayground._init_workspace 读取）
  workspace_template: "playground/hamilton/workspace_newtonbench"
  seed_input_csv: false
  require_input_csv: false
  # NewtonBench 完成护栏（在 finish(task_completed="true") 前校验）
  newtonbench_protocol:
    require_signature_match: true
    require_finite_rmsle: true
    max_rmsle: 2.0

llm_output:
  show_in_console: true
  log_to_file: true

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  console: true

project_root: "."
debug: false
