# Hamilton Playground 配置文件
# 通用符号回归 / ODE 发现 Agent

# ============================================
# LLM 配置
# ============================================
llm:
  openai:
    provider: "openai"
    model: "gpt-5"
    api_key: "sk-1HEDl1RNtaMQV7TDet0FUA"
    base_url: "https://llm.dp.tech"
    temperature: 0.7
    max_tokens: 128000
    timeout: 120
    max_retries: 3
    retry_delay: 1.0

  default: "openai"

# ============================================
# Agent 配置（新版 per-agent 格式）
# ============================================
agents:
  hamilton:
    llm: "openai"
    max_turns: 120
    enable_tools: true

    context:
      max_tokens: 200000
      truncation_strategy: "latest_half"
      preserve_system_messages: true
      preserve_recent_turns: 10

    system_prompt_file: "prompts/hamilton_system.txt"
    user_prompt_file: "prompts/hamilton_user.txt"

    # Per-agent skills（只加载需要的，不污染 prompt）
    skills:
      - pysr
      - evo-protocol

    # Per-agent tools
    tools:
      builtin: ["*"]

# ============================================
# Session 配置
# ============================================
session:
  type: "local"

  local:
    working_dir: "./playground/hamilton/workspace"
    timeout: 21600
    gpu_devices: null
    cpu_devices: null
    symlinks:
      "evomaster/skills/pysr": "skills/pysr"

# ============================================
# 实验配置
# ============================================
experiment:
  record_dir: "./playground/hamilton/records"
  max_rounds: 3

# ============================================
# LLM 输出 & 工具调用日志
# ============================================
llm_output:
  show_in_console: true
  log_to_file: true

# ============================================
# 日志配置
# ============================================
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  console: true

# ============================================
# 项目配置
# ============================================
project_root: "."
debug: false
